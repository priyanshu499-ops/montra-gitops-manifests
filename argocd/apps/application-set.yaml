apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          # format to add new app:
          # - env: < dev , prod , uat >
          #   project: < dev , prod , uat >
          #   app: < app-name >
          #   cluster: https://kubernetes.default.svc          # in-cluster (default)
          # OR for development-montra-cluster (GKE):
          #   cluster: https://gke-f430e707bd3f453ab4a7f498543e5de05754-433218788168.asia-south2.gke.goog

          - env: dev
            project: dev
            app: auth-service
            cluster: https://gke-f430e707bd3f453ab4a7f498543e5de05754-433218788168.asia-south2.gke.goog

          - env: dev
            project: dev
            app: instacard-mock-apis
            cluster: https://gke-f430e707bd3f453ab4a7f498543e5de05754-433218788168.asia-south2.gke.goog

          - env: dev
            project: dev
            app: instacard-user-service
            cluster: https://gke-f430e707bd3f453ab4a7f498543e5de05754-433218788168.asia-south2.gke.goog

          - env: dev
            project: dev
            app: virtualcard-service
            cluster: https://gke-f430e707bd3f453ab4a7f498543e5de05754-433218788168.asia-south2.gke.goog



  template:
    metadata:
      name: '{{app}}-{{env}}'
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      labels:
        environment: '{{env}}'
        app: '{{app}}-{{env}}'
    spec:
      project: '{{project}}'
      source:
        repoURL: 'https://github.com/priyanshu499-ops/montra-gitops-manifests.git'
        targetRevision: HEAD
        path: gitops-repo/helm
        helm:
          valueFiles:
            - values.yaml
            - '../applications/{{env}}/{{app}}-values.yaml'
      destination:
        server: '{{cluster}}'
        namespace: '{{env}}'
      syncPolicy:
        # manual sync everywhere now — automated block removed (dev used to have it)
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 2
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m