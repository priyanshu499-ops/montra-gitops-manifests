apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Prod environment — manual sync with approval gate

  sourceRepos:
    - 'https://github.com/priyanshu499-ops/montra-gitops-manifests.git'

  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: 'prod'
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: '*'
      kind: '*'

  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'

  orphanedResources:
    warn: true
