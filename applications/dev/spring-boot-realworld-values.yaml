nameOverride: spring-boot-realworld
fullnameOverride: spring-boot-realworld

global:
  replicaCount: 1
  namespace: dev

deployment:
  image:
    name: "asia-south2-docker.pkg.dev/montra-490412/dev-app-images/spring-boot-realworld-app"
    tag: "latest"
  resources:
    limits:
      cpu: 250m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  livenessProbe:
    httpGet:
      path: /api/articles
      port: http
  readinessProbe:
    httpGet:
      path: /api/articles
      port: http

service:
  type: ClusterIP
  specs:
    - name: http
      port: 80
      targetPort: 8080

hpa:
  enabled: false
