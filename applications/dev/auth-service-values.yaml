nameOverride: java-app-dev
fullnameOverride: java-app-dev

global:
  replicaCount: 1
  namespace: dev

deployment:
  image:
    name: "asia-south2-docker.pkg.dev/development-498908/dev-app-images/auth-service"
    tag: "d409e25"

  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 126Mi
      
  # Load ESO secret containing DB_PASSWORD_APP_USER
  envFrom:
    - secretRef:
        name: dev-cloudsql-db-secret

  # Spring Boot datasource configuration for Cloud SQL (10.14.0.7:3306)
  environment:
    SPRING_DATASOURCE_URL: "jdbc:mysql://10.14.0.7:3306/userdb?createDatabaseIfNotExist=true&useSSL=false"
    SPRING_DATASOURCE_USERNAME: "app_user"
    SPRING_DATASOURCE_PASSWORD: "$(DB_PASSWORD_APP_USER)"
    SPRING_DATASOURCE_DRIVER_CLASS_NAME: "com.mysql.cj.jdbc.Driver"
    SPRING_JPA_DATABASE_PLATFORM: "org.hibernate.dialect.MySQLDialect"




  # livenessProbe:
  #   httpGet:
  #     path: /
  #     port: http
  #   initialDelaySeconds: 30
  #   periodSeconds: 10
  #   timeoutSeconds: 5
  #   failureThreshold: 3

  # readinessProbe:
  #   httpGet:
  #     path: /health
  #     port: http
  #   initialDelaySeconds: 10
  #   periodSeconds: 5
  #   timeoutSeconds: 3
  #   failureThreshold: 3

service:
  type: ClusterIP
  specs:
    - name: http
      port: 80
      targetPort: 8080

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: java-app-dev-dev.example.com
      paths:
        - path: /
          pathType: Prefix


pdb:
  enabled: false
  minAvailable: 1


configmap:
  enabled: false
  data: {}


secret:
  enabled: false
  data: {}


networkPolicy:
  enabled: false

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPU: 70
  targetMemory: 80
