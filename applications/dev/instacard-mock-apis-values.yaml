nameOverride: java-app-dev
fullnameOverride: java-app-dev

global:
  replicaCount: 1
  namespace: dev

deployment:
  image:
    name: "asia-south2-docker.pkg.dev/development-498908/dev-app-images/instacard-mock-apis"
    tag: "39eca30"

  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 126Mi

  # 1. Pull raw values from ESO secret
  envFrom:
    - secretRef:
        name: dev-cloudsql-db-secret

  # 2. Construct Spring Boot properties using variables from envFrom
  environment:
    SPRING_DATASOURCE_URL: "jdbc:postgresql://$(DB_HOST):5432/$(DB_NAME)"
    SPRING_DATASOURCE_USERNAME: "$(DB_USER)"
    SPRING_DATASOURCE_PASSWORD: "$(DB_PASS)"
    SPRING_JPA_DATABASE_PLATFORM: "org.hibernate.dialect.PostgreSQLDialect"



  # livenessProbe:
  #   httpGet:
  #     path: /
  #     port: http
  #   initialDelaySeconds: 30
  #   periodSeconds: 10
  #   timeoutSeconds: 5
  #   failureThreshold: 3

  # readinessProbe:
  #   httpGet:
  #     path: /health
  #     port: http
  #   initialDelaySeconds: 10
  #   periodSeconds: 5
  #   timeoutSeconds: 3
  #   failureThreshold: 3

service:
  type: ClusterIP
  specs:
    - name: http
      port: 80
      targetPort: 8080

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: java-app-dev-dev.example.com
      paths:
        - path: /
          pathType: Prefix


pdb:
  enabled: false
  minAvailable: 1


configmap:
  enabled: false
  data: {}


secret:
  enabled: false
  data: {}


networkPolicy:
  enabled: false

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPU: 70
  targetMemory: 80
